# RelayTerm Forgejo Actions CI — build + (conditional) publish.
#
# Scope:
#   * cargo fmt / clippy / test (workspace, default features)
#   * pnpm -r check / build / test
#   * docker build for `Dockerfile.backend` (default and `--target migrate`)
#     and `Dockerfile.web`
#   * publish-images: pushes the three OCI images to the Forgejo
#     container registry at `git.js-node.cc`. RUNS ONLY on push-to-main,
#     `v*` tag pushes, and `workflow_dispatch`. NEVER on `pull_request`.
#
# Out of scope (intentionally deferred):
#   * Auto-deploy / SSH / Watchtower / production compose pull-update.
#   * Image signing (cosign / notary), SBOM, vulnerability scanning,
#     registry retention/cleanup policies.
#   * Multi-arch / `linux/arm64`. Single-arch only.
#   * Remote / registry build cache. BuildKit cache mounts only.
#   * Cargo / pnpm dependency caching across runs (first-run-time only).
#   * Playwright / browser SSH smoke (manual per `apps/web/e2e/SMOKE.md`).
#
# Runner pattern (mirrors `git.js-node.cc/jsprague/qshift`):
#   * Every job runs inside `catthehacker/ubuntu:act-latest` — the standard
#     Forgejo-runner-compatible base image. It ships docker CLI + buildx,
#     git, curl, and a Node runtime, so JS-based actions (`checkout`,
#     `setup-node`, `setup-buildx`, `login`, `build-push`) work without
#     per-job bootstrap. Earlier per-job choices `rust:1.95-bookworm` and
#     `docker:28-cli` failed `actions/checkout@v4` at 0s because those
#     images don't ship Node, and the Forgejo runner does NOT inject one.
#   * Toolchains are installed *inside* the job rather than baked into the
#     container image: Rust 1.95 via rustup-init in `rust-checks`, Node 22
#     via `setup-node` in `web-checks`. The Docker daemon is reached via
#     `DOCKER_HOST` + TLS certs already plumbed by the runner's
#     `container.options` config — see `§6.1` of
#     `docs/deployment/docker-compose.md`.
#   * Checkout uses the explicit Forgejo-hosted URL
#     `https://code.forgejo.org/actions/checkout@v4`. The bare
#     `actions/checkout@v4` form depends on the runner's
#     `DEFAULT_ACTIONS_URL` config and is fragile across instances; the
#     explicit URL is the qshift-validated pattern on this runner.
#
# Runner requirements:
#   * `docker` label on the Forgejo runner.
#   * Docker daemon access for the `docker-build` AND `publish-images`
#     jobs (socket-mount or DinD sidecar). See
#     https://forgejo.org/docs/latest/admin/actions/docker-access and
#     `docs/deployment/docker-compose.md` ("CI image build" + "Registry
#     publishing" sections).
#
# Registry auth (publish-images only):
#   * Repo secret `FORGEJO_REGISTRY_TOKEN` — Forgejo personal access
#     token with `write:package` scope. Generate via Forgejo →
#     Settings → Applications → Generate new token, then add under
#     repo Settings → Secrets. The token is consumed by
#     `docker/login-action` via `password-stdin` and is NEVER echoed.
#   * Username is `${{ github.actor }}` — Forgejo aliases the github
#     context for action compatibility.
#
# Toolchain pins (must stay in lockstep with the Dockerfiles):
#   * Rust  1.95 — pinned in the rustup-init step of `rust-checks`
#                  (`--default-toolchain 1.95` — rustup resolves to the
#                  latest 1.95.x). Mirrors `Dockerfile.backend` `ARG
#                  RUST_VERSION=1.95` (Docker Hub `rust:1.95-bookworm`
#                  resolves the same way). Tracks the working local dev
#                  toolchain, NOT a specific language-feature
#                  requirement — Cargo.toml's `rust-version = "1.85"` is
#                  the actual MSRV. Bumping keeps CI's compiler
#                  diagnostics aligned with what the dev sees locally.
#   * Node  22   — pinned in the `setup-node` step of `web-checks`.
#                  Mirrors `Dockerfile.web` `ARG NODE_VERSION=22`.
#                  Current LTS line.
#   * pnpm      — pinned by `package.json#packageManager` via corepack.
# Bumping any of these requires bumping the matching Dockerfile ARG and
# `docs/deployment/docker-compose.md` "Selected base images" together.

name: ci

on:
  push:
    branches:
      - main
    # Release-style publishes are driven by `v*` annotated tags. The
    # `publish-images` job below derives its `:vX.Y.Z` image tag from
    # `${{ github.ref_name }}`. Pushing a non-`v*` tag does not trigger
    # CI.
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# Avoid redundant CI on the same branch — when a new push lands while
# a previous run is still in flight, cancel the older one. EXCEPT on
# `main`, where every push must produce a verdict so we never cascade-
# cancel a run that would have published images. Conditional pattern
# is documented at https://forgejo.org/docs/latest/user/actions/reference/
# under "Conditional Concurrency Cancellation".
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust-checks:
    name: rust checks (fmt + clippy + test)
    runs-on: [lxc, rust-high]
    container:
      image: catthehacker/ubuntu:act-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_BUILD_JOBS: 64
      RUSTFLAGS: -D warnings
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: install Tauri Linux build dependencies (apt)
        # Tauri v2 Linux build deps (GTK/WebKit/etc.). Single source
        # of truth at `.forgejo/actions/apt-tauri-linux/`; desktop-
        # linux.yml shares the same composite so the package list
        # cannot drift between this workspace clippy/test gate and
        # the desktop bundle build.
        uses: ./.forgejo/actions/apt-tauri-linux

      - name: install Rust 1.95 (with clippy + rustfmt)
        # Pin matches `Dockerfile.backend` `ARG RUST_VERSION=1.95`;
        # both rustup and Docker Hub `rust:1.95-bookworm` resolve to
        # the latest 1.95.x patch, so they float in lockstep.
        uses: ./.forgejo/actions/setup-rust
        with:
          toolchain: '1.95'
          components: 'clippy,rustfmt'

      - name: cache cargo dependencies
        # `Swatinem/rust-cache@v2` replaces the previous raw
        # `actions/cache@v3` block. It hashes `Cargo.lock` + `rustc -V`
        # + workspace member set; restores `~/.cargo/{registry,git}` +
        # `target/`; and crucially PRUNES `target/` before save (strips
        # `*.rmeta` / non-workspace dep artifacts / stale incremental
        # dirs) so the cache stays small. Must run AFTER `rustup-init`
        # so `cargo` is on PATH. `cache-bin: false` keeps the action
        # from scrubbing `~/.cargo/bin` (its default behaviour is
        # surprising on self-hosted runners). `save-if` restricts cache
        # WRITES to main / tag refs — feature branches still RESTORE
        # from main's cache but don't add their own ephemeral entries.
        # https://github.com/Swatinem/rust-cache (v2.9.1, 2026-03-12)
        uses: https://github.com/Swatinem/rust-cache@v2
        with:
          shared-key: workspace
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Default features only. The `postgres-tests` feature on
        # `relayterm-db` and `relayterm-api` requires a live Postgres
        # via `DATABASE_URL` — those integration tests are not part of
        # the build-only CI gate. See `crates/relayterm-db/tests/`.
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  web-checks:
    name: web checks (check + build + test)
    runs-on: [lxc, high-cpu]
    container:
      image: catthehacker/ubuntu:act-latest
    env:
      CI: "1"
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: docs contract check
        # Pure bash; no node/pnpm/network. Runs BEFORE the slow
        # toolchain installs to fail fast on docs regressions.
        uses: ./.forgejo/actions/docs-contracts

      - name: setup Node + pnpm (with store cache, install)
        # pnpm/action-setup@v6 (cache: true, version pinned to
        # package.json#packageManager) + setup-node@v4 (node 22) +
        # `pnpm install --frozen-lockfile`. Single composite.
        uses: ./.forgejo/actions/setup-node-pnpm

      - name: pnpm check
        run: pnpm -r check

      - name: pnpm lint
        # Several workspace packages (terminal-* renderers, apps/web)
        # currently expose a "lint" script that is a no-op echo; this
        # step is here so AGENTS.md "Definition of done" item 2 is
        # actually gated by CI even if a future package wires real
        # linting under the same script name.
        run: pnpm -r lint

      - name: pnpm build
        run: pnpm -r build

      - name: pnpm test
        run: pnpm -r test

  docker-build:
    name: docker build (backend + migrate + web)
    runs-on: [lxc, docker]
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: discover DinD endpoint
        # /proc/net/route gateway discovery + DOCKER_HOST export.
        # See `.forgejo/actions/dind-docker-host/action.yml` for the
        # full rationale on why this is needed (act/forgejo-runner
        # drops `container.options` when the workflow declares its
        # own `container:` block).
        uses: ./.forgejo/actions/dind-docker-host

      - name: docker info
        # Surfaces the daemon endpoint the job is talking to so a
        # misconfigured runner produces a recognisable failure instead
        # of a generic "connection refused" further down. Does NOT print
        # credentials.
        run: docker info

      - name: build relayterm-backend (runtime)
        run: docker build -f Dockerfile.backend -t relayterm-backend:ci .

      - name: build relayterm-migrate (sqlx-cli + migrations)
        run: docker build -f Dockerfile.backend --target migrate -t relayterm-migrate:ci .

      - name: build relayterm-web
        run: docker build -f Dockerfile.web -t relayterm-web:ci .

  publish-images:
    name: publish images (forgejo registry)
    needs: [rust-checks, web-checks, docker-build]
    # Publish ONLY on push-to-main, `v*` tag pushes, and operator-driven
    # workflow_dispatch. PRs build (via `docker-build`) but never push —
    # an attacker submitting a PR cannot smuggle an image into the
    # registry. The condition is duplicated rather than centralised in
    # `on:` because the build/test jobs above must keep running on PRs
    # for the gate to mean anything.
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: [lxc, docker]
    container:
      image: catthehacker/ubuntu:act-latest
    env:
      # Centralised registry/owner/repo for the three images. The
      # publish step builds `${REGISTRY}/${IMAGE_NAMESPACE}/<name>:<tag>`
      # for backend, backend-migrate, and web.
      REGISTRY: git.js-node.cc
      IMAGE_NAMESPACE: jsprague
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: discover DinD endpoint
        # /proc/net/route gateway discovery + DOCKER_HOST export.
        # setup-buildx-action, login-action, and build-push-action
        # all read DOCKER_HOST; this composite makes them work.
        uses: ./.forgejo/actions/dind-docker-host

      - name: verify registry token is configured
        # Surface a precise, actionable failure when
        # `secrets.FORGEJO_REGISTRY_TOKEN` is missing or unavailable to
        # this workflow run. Without this preflight, `docker/login-action`
        # fails with the generic `::error::Password required` message —
        # which is ambiguous between "secret not set in repo settings"
        # and "secret rotated / scoped wrong / permission lost".
        #
        # Redaction posture: the token is passed via `env:` (Forgejo
        # masks secret values in logs) and tested for emptiness with
        # `[ -z "${VAR:-}" ]`. The value itself is NEVER expanded into
        # a command line, an `echo`, a here-doc, or `set -x` output —
        # only the *length-zero* check executes. The error message is
        # static and operator-actionable; it does not echo any secret-
        # adjacent state.
        env:
          FORGEJO_REGISTRY_TOKEN: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
        run: |
          set -eu
          if [ -z "${FORGEJO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::FORGEJO_REGISTRY_TOKEN repository secret is not configured or is unavailable to this workflow."
            exit 1
          fi

      - name: set up docker buildx
        # `setup-buildx-action` with version PINNED to v0.21.3 — the
        # last release before buildx v0.22 added "Automatic GPU
        # Detection" (https://docs.docker.com/build/building/cdi).
        # v0.22+ probes the kernel of the machine buildx is running on
        # (here: the LXC host, which has NVIDIA kernel drivers because
        # epyc-ai also hosts vllm) and unconditionally adds an
        # `--gpus=all`-equivalent `HostConfig.DeviceRequests` row to
        # the builder container. DinD has no GPU runtime so container
        # start fails with:
        #   could not select device driver "" with capabilities: [[gpu]]
        # There is no documented `--no-gpus` / `BUILDX_NO_GPU` flag in
        # buildx as of 2026-05; pinning the CLI is the canonical
        # workaround per
        # https://docs.docker.com/build/ci/github-actions/configure-builder
        # ("Pin Buildx Version"). Revisit when upstream ships an
        # opt-out flag.
        uses: https://github.com/docker/setup-buildx-action@v3
        with:
          version: v0.21.3

      - name: log in to forgejo container registry
        # `docker/login-action` writes the token to ~/.docker/config.json
        # via `--password-stdin`; the token never appears on a command
        # line and never lands in the workflow log.
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}

      - name: compute image tags
        id: tags
        # Tag policy:
        #   * push to main          → :main         + :sha-<short>
        #   * push to v* tag        → :vX.Y.Z       + :sha-<short>
        #   * workflow_dispatch     → :<ref_name>   + :sha-<short>
        # We deliberately do NOT publish `:latest` — operators pin
        # explicitly (`:vX.Y.Z` for releases, `:sha-...` for rollback,
        # `:main` for branch-tracking dev installs).
        #
        # The two `${{ github.* }}` substitutions both come from the
        # Forgejo action context (not user input), but `ref_name` can
        # carry slashes when a feature branch is dispatched (e.g.
        # `chore/foo`). We `printf` it through a quoted positional
        # argument so a slash, equals sign, or newline in `ref_name`
        # cannot corrupt the `GITHUB_OUTPUT` file.
        env:
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          sha_short=$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)
          printf 'sha_short=%s\n' "${sha_short}" >> "$GITHUB_OUTPUT"
          printf 'ref_tag=%s\n' "${REF_NAME}" >> "$GITHUB_OUTPUT"

      # Restored from the plain `docker build` / `docker push` shape:
      # with buildx pinned to v0.21.3 (above) the autodetect regression
      # is sidestepped, so `docker/build-push-action@v6` works again
      # and gives us multi-tag-in-one-pass and a clean path to add
      # registry-cache exporters in Group 4 of the CI review without
      # touching this surface a second time.
      - name: build and push relayterm-backend
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          target: runtime
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relayterm-backend:${{ steps.tags.outputs.ref_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relayterm-backend:sha-${{ steps.tags.outputs.sha_short }}

      - name: build and push relayterm-backend-migrate
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          target: migrate
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relayterm-backend-migrate:${{ steps.tags.outputs.ref_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relayterm-backend-migrate:sha-${{ steps.tags.outputs.sha_short }}

      - name: build and push relayterm-web
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relayterm-web:${{ steps.tags.outputs.ref_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/relayterm-web:sha-${{ steps.tags.outputs.sha_short }}
