# RelayTerm local-development config example.
#
# Copy this file to `config/relayterm.toml` (or point `RELAYTERM_CONFIG`
# at the path you choose) and adjust as needed. Env vars override TOML
# values; the env name is the TOML key path, all-caps, with `__`
# (double underscore) as the section separator.
#
# Dev mode runs the SAME real-auth code path as production — the same
# `AuthenticatedUser` extractor, the same `/api/v1/auth/*` routes, the
# same cookie semantics. Only the boot-time validation envelope is
# relaxed (no required signing key, no Secure cookie, empty allow-list
# is allowed but every browser-write is then rejected at the CSRF
# guard).
#
# The legacy DevUser bypass is gone; there is no "skip the auth check"
# toggle. The first time you boot dev mode against an empty database
# you must bootstrap exactly the same way as production — see
# `docs/production-auth.md` §4.

[server]
bind = "127.0.0.1:8080"

[database]
# The dev compose file at `deploy/docker-compose.yml` ships a Postgres
# container with these credentials.
url = "postgres://relayterm:relayterm@127.0.0.1:5432/relayterm"
max_connections = 10

[auth]
mode = "dev"

# Allowed Origins for the Vite dev server. The web app runs on port
# 5173 and proxies `/api` and `/ws` to this backend on 127.0.0.1:8080,
# so the browser-side Origin is whichever URL you typed —
# `http://localhost:5173` or `http://127.0.0.1:5173`. Both forms must
# be on the allow-list if you want to use either.
allowed_origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]

# Insecure cookie for plain-HTTP local development. The Tauri / web
# dev story is HTTP, not HTTPS, so a `Secure` cookie would be ignored
# by the browser and you'd never receive a session.
cookie_secure = false

# Bootstrap token for the first-user creation flow. Use any high-
# entropy value during development; `openssl rand -base64 32` is
# convenient. Recommended to set this via env on the process so you
# can rotate without editing the file.
# first_user_bootstrap_token = "DEV_REPLACE_ME"

# Session signing key is OPTIONAL in dev mode (the v1 session model
# does not consume it yet). Leave both sources unset for local
# development.

[vault]
# Enable backend-generated SSH identities locally if you want to
# exercise the vault path. Generate a throwaway 32-byte base64 key
# (`openssl rand -base64 32`) and set the env var
# `RELAYTERM_VAULT__MASTER_KEY_B64`, or set
# `RELAYTERM_VAULT__MASTER_KEY_FILE` to a file path. Setting
# `enabled = false` makes `POST /api/v1/ssh-identities` return 503,
# which is fine if you are not exercising that surface.
enabled = false

[terminal_recording]
# Durable terminal recording is OFF by default and the writer is not
# yet implemented (step 1b of `docs/terminal-recording.md` Section 13
# is config-only). Leave this disabled in dev too — flipping it on
# adds nothing today other than extra validation. The full design
# (privacy posture, retention defaults, threat model) lives in
# `docs/terminal-recording.md`; read it before enabling on any host.
enabled = false

# In dev mode, recording with `encryption.mode = "disabled"` is
# permitted (production is the strict envelope). The contributor
# exercising future recording slices locally does not need to mint a
# 32-byte master key just to boot; the validation envelope only
# requires a key when `auth.mode = production` AND
# `terminal_recording.enabled = true`.
#
# Numeric defaults are picked up from the backend; uncomment the
# fields below only if you want to override locally.
# retention_days        = 30
# max_bytes_per_session = 67108864    # 64 MiB
# chunk_target_bytes    = 65536       # 64 KiB
# chunk_hard_cap_bytes  = 2097152     # 2 MiB

# [terminal_recording.encryption]
# mode = "disabled"

# [terminal_recording.compression]
# mode = "none"

# Retention cleanup. Stage A startup sweep AND Stage B periodic
# managed worker are both wired. Cleanup is independent of
# `terminal_recording.enabled`: an existing recording corpus continues
# to age out even after recording is later disabled.
#
# Stage A — single bounded sweep at boot, BEFORE the listener binds.
# Gated by `cleanup.enabled` AND `cleanup.startup_sweep_enabled`. A
# repository error is fail-soft (logged with a static category tag,
# boot continues to the listener bind).
#
# Stage B — managed periodic task, spawned AFTER `AppState`
# construction and BEFORE the listener accepts connections. Gated by
# `cleanup.enabled` AND `cleanup.periodic_sweep_enabled` AND a
# non-zero `cleanup.sweep_interval_seconds`. The first periodic tick
# fires AFTER `sweep_interval_seconds` has elapsed (the startup sweep
# already covers boot). Each tick takes a Postgres advisory lock so a
# multi-instance deployment never double-sweeps; lock contention is a
# silent skip. Shutdown is wired to the same graceful-shutdown signal
# that drives `axum::serve`.
#
# Env name pattern:
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__ENABLED
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__STARTUP_SWEEP_ENABLED
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__PERIODIC_SWEEP_ENABLED
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__SWEEP_INTERVAL_SECONDS
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__BATCH_SIZE
#
# [terminal_recording.cleanup]
# enabled                 = true     # default true; master switch for both stages
# startup_sweep_enabled   = true     # default true; one bounded sweep at boot
# periodic_sweep_enabled  = false    # default false; flip to true to run Stage B
# sweep_interval_seconds  = 0        # 0 = no periodic schedule; or 60..=604800
# batch_size              = 100      # 1..=10000; sessions per sweep iteration

# Live-terminal-session orchestration. Currently exposes one operator
# knob: how long a still-live SSH PTY lingers after the last client
# detaches before the orchestrator reaps it. Reattach within this
# window resumes the same shell; outside it the PTY closes and the
# session id surfaces a 409 from the WebSocket upgrade gate.
#
# This is a SHORT-TERM RECONNECT GRACE WINDOW on a still-live PTY held
# by the running backend — NOT durable session resume. A backend
# restart drops every live PTY regardless of this value. Long-term
# persistent sessions (tmux/screen-style resurrection across restarts,
# days-long shell retention) are a separate, future architecture;
# bumping this value past minutes does not move toward that — it just
# keeps remote shells pinned alive longer on this process. Higher
# values consume backend RAM, file descriptors, and the SSH server's
# PTY budget for the full duration.
#
# Default: 30s (matches the historical hard-coded value). Bounded
# 5..=86400 (5s..24h). Use a short value for low-resource deployments;
# use a longer value such as 300–1800s if desktop/mobile reconnect
# after app restart is important on this slot.
#
# Env: RELAYTERM_TERMINAL_SESSIONS__DETACHED_LIVE_PTY_TTL_SECONDS
#
# [terminal_sessions]
# detached_live_pty_ttl_seconds = 30

# Per-user ceiling on concurrent live PTY runtimes (Phase 1B.1 quota
# — see `docs/session-quotas.md`). Counted against the in-memory
# orchestrator registry — both `active` and `detached` sessions count
# equally. A `POST /api/v1/terminal-sessions` that would exceed this
# ceiling is refused with `429 too_many_sessions`; the refusal writes
# no DB row and no audit event. Each live PTY consumes one russh
# channel, one target-host PTY, one in-memory replay buffer, and one
# or more tasks.
#
# Default: 8 (conservative for solo homelab, defensible for small
# multi-user). Bounded 1..=256. Single-tenant homelabs typically
# leave the default; a small multi-user instance might raise it to
# 16. The deployment-wide ceiling is a Phase 1B.2 concern and is
# NOT covered by this knob.
#
# Env: RELAYTERM_TERMINAL_SESSIONS__MAX_LIVE_PTY_SESSIONS_PER_USER
#
# [terminal_sessions]
# max_live_pty_sessions_per_user = 8
