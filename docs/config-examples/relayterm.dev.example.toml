# RelayTerm local-development config example.
#
# Copy this file to `config/relayterm.toml` (or point `RELAYTERM_CONFIG`
# at the path you choose) and adjust as needed. Env vars override TOML
# values; the env name is the TOML key path, all-caps, with `__`
# (double underscore) as the section separator.
#
# Dev mode runs the SAME real-auth code path as production — the same
# `AuthenticatedUser` extractor, the same `/api/v1/auth/*` routes, the
# same cookie semantics. Only the boot-time validation envelope is
# relaxed (no required signing key, no Secure cookie, empty allow-list
# is allowed but every browser-write is then rejected at the CSRF
# guard).
#
# The legacy DevUser bypass is gone; there is no "skip the auth check"
# toggle. The first time you boot dev mode against an empty database
# you must bootstrap exactly the same way as production — see
# `docs/production-auth.md` §4.

[server]
bind = "127.0.0.1:8080"

[database]
# The dev compose file at `deploy/docker-compose.yml` ships a Postgres
# container with these credentials.
url = "postgres://relayterm:relayterm@127.0.0.1:5432/relayterm"
max_connections = 10

[auth]
mode = "dev"

# Allowed Origins for the Vite dev server. The web app runs on port
# 5173 and proxies `/api` and `/ws` to this backend on 127.0.0.1:8080,
# so the browser-side Origin is whichever URL you typed —
# `http://localhost:5173` or `http://127.0.0.1:5173`. Both forms must
# be on the allow-list if you want to use either.
allowed_origins = [
  "http://localhost:5173",
  "http://127.0.0.1:5173",
]

# Insecure cookie for plain-HTTP local development. The Tauri / web
# dev story is HTTP, not HTTPS, so a `Secure` cookie would be ignored
# by the browser and you'd never receive a session.
cookie_secure = false

# Bootstrap token for the first-user creation flow. Use any high-
# entropy value during development; `openssl rand -base64 32` is
# convenient. Recommended to set this via env on the process so you
# can rotate without editing the file.
# first_user_bootstrap_token = "DEV_REPLACE_ME"

# Session signing key is OPTIONAL in dev mode (the v1 session model
# does not consume it yet). Leave both sources unset for local
# development.

[vault]
# Enable backend-generated SSH identities locally if you want to
# exercise the vault path. Generate a throwaway 32-byte base64 key
# (`openssl rand -base64 32`) and set the env var
# `RELAYTERM_VAULT__MASTER_KEY_B64`, or set
# `RELAYTERM_VAULT__MASTER_KEY_FILE` to a file path. Setting
# `enabled = false` makes `POST /api/v1/ssh-identities` return 503,
# which is fine if you are not exercising that surface.
enabled = false
