# RelayTerm production config example.
#
# Copy this file to `config/relayterm.toml` (or point `RELAYTERM_CONFIG`
# at the path you choose) and fill in real values. Every key here can
# also be supplied as an environment variable — env vars override the
# TOML file. The env name is the TOML key path, all-caps, with `__`
# (double underscore) as the section separator: `auth.cookie_secure`
# becomes `RELAYTERM_AUTH__COOKIE_SECURE`.
#
# See `docs/production-auth.md` for the operational guide:
#   - secret generation
#   - first-user bootstrap flow
#   - reverse-proxy / HTTPS notes
#   - startup failure modes and recovery paths.

[server]
# Bind address. Behind a TLS-terminating reverse proxy, keep this on
# loopback. The proxy is responsible for HTTPS; the backend speaks
# plain HTTP upstream.
bind = "127.0.0.1:8080"

[database]
# Postgres connection string. The password segment is masked in the
# `Debug` output that lands in tracing logs, but it is still on disk in
# this file — protect the file accordingly (`chmod 0600` and own it as
# the backend user). `DATABASE_URL` is also honoured for sqlx-cli
# parity if you prefer the env form.
url = "postgres://relayterm:CHANGE_ME@127.0.0.1:5432/relayterm"
max_connections = 10

[auth]
# Production mode enforces the strict boot-time envelope:
#   - exactly one session signing key source
#   - non-empty allowed_origins
#   - cookie_secure = true
# A misconfiguration refuses to start; the backend never opens its
# listener with a half-valid auth posture.
mode = "production"

# Session signing key — 32 bytes, base64. Generate with:
#   openssl rand -base64 32
#
# Pick exactly one source. Setting both is rejected at boot as
# ambiguous; setting neither is rejected as missing. The key is
# currently reserved (the v1 session model uses opaque hashed tokens),
# but it is required so that the rotation/redaction discipline is in
# place when the signed-CSRF / signed-cookie variants land.
#
# Recommended: keep the value out of this file. Set the env var on the
# process — `RELAYTERM_AUTH__SESSION_SIGNING_KEY_B64` or
# `RELAYTERM_AUTH__SESSION_SIGNING_KEY_FILE` — and leave the keys
# below commented out. If you do put it in TOML, `chmod 0600` the
# file.
# session_signing_key_b64  = "REPLACE_ME_WITH_BASE64_32_BYTES"
# session_signing_key_file = "/etc/relayterm/session-signing-key"

# CSRF / Origin allow-list. Each entry is an exact `scheme://host[:port]`
# string — no trailing slash, no path. Comparison is case-sensitive
# byte-equality against the browser's `Origin` header. Empty list is
# rejected at boot in production. Multiple values become a TOML array.
allowed_origins = ["https://relay.example.com"]

# `Set-Cookie: ...; Secure` flag. MUST be true in production. The
# browser will refuse to send the session cookie over plain HTTP, which
# is what you want — the reverse proxy terminates TLS and the browser
# always sees HTTPS.
cookie_secure = true

# Optional `Set-Cookie: ...; Domain=` attribute. Omit for a host-only
# cookie (the recommended default). Set this only if you need to share
# the session across subdomains and you understand the implications.
# cookie_domain = "relay.example.com"

# First-user bootstrap token. Required at startup IFF no row exists in
# `user_passwords` (i.e. no user has ever finished the bootstrap flow).
# After the first user is created, unset this and restart — `POST
# /api/v1/auth/bootstrap` returns 409 once a password row exists, but
# unsetting the token is good operational hygiene.
#
# Generate with: openssl rand -base64 32 | tr '+/' '-_' | tr -d '='
#
# Recommended: keep the value out of this file. Set
# `RELAYTERM_AUTH__FIRST_USER_BOOTSTRAP_TOKEN` on the process for the
# bootstrap window only.
# first_user_bootstrap_token = "REPLACE_ME_FOR_FIRST_BOOT_THEN_UNSET"

[vault]
# The vault master key is a SEPARATE secret from the session signing
# key. It is the symmetric AEAD key used to encrypt SSH private keys
# stored by the backend. Disable with `enabled = false` if you do not
# want backend-generated SSH identities; in that mode `POST
# /api/v1/ssh-identities` returns 503.
enabled = true

# 32 bytes, base64. Generate with:
#   openssl rand -base64 32
#
# As with the session signing key, prefer setting this via the env var
# `RELAYTERM_VAULT__MASTER_KEY_B64` or `RELAYTERM_VAULT__MASTER_KEY_FILE`
# rather than committing it here.
# master_key_b64  = "REPLACE_ME_WITH_BASE64_32_BYTES"
# master_key_file = "/etc/relayterm/vault-master-key"

# Durable terminal recording (config foundation; writer not yet
# implemented).
#
# This section is the typed config landed by step 1b of
# `docs/terminal-recording.md` Section 13. The config is accepted at
# boot, validated, and otherwise unused — the chunk writer, replay API,
# and frontend replay viewer are deliberately later slices. Flipping
# `enabled = true` today does not record anything; it only causes
# production validation to require a master key.
#
# Recording is OFF by default. Leave the whole section commented out
# unless you have read `docs/terminal-recording.md` end-to-end, including
# the privacy posture in Section 7.
# [terminal_recording]
# enabled = true
# # Per-session retention from `terminal_sessions.closed_at`. The cleanup
# # worker (later slice) will sweep chunks older than this; until that
# # slice ships, this number is informational. Bounded 1..=3650.
# retention_days = 30
# # Per-session byte cap. The future writer drops further chunks for
# # *recording only* once a session exceeds this; the live wire is
# # never affected. Default 64 MiB.
# max_bytes_per_session = 67108864
# # Soft chunk flush target (64 KiB).
# chunk_target_bytes = 65536
# # Hard per-row size cap (2 MiB). MUST exceed the live wire's 1 MiB
# # single-frame cap plus AEAD envelope overhead.
# chunk_hard_cap_bytes = 2097152
#
# [terminal_recording.encryption]
# # `disabled` writes plaintext PTY bytes at rest; production refuses
# # this combination. `required` writes XChaCha20-Poly1305 envelope
# # rows and refuses to start without a key. The recording master key
# # MUST be a SEPARATE secret from `vault.master_key_b64` /
# # `vault.master_key_file`; the validator rejects equal sources.
# mode = "required"
# # 32 bytes, base64 — same shape as the vault key but a DIFFERENT
# # secret. Generate with: openssl rand -base64 32
# # Recommended: set
# # `RELAYTERM_TERMINAL_RECORDING__ENCRYPTION__MASTER_KEY_B64` or
# # `RELAYTERM_TERMINAL_RECORDING__ENCRYPTION__MASTER_KEY_FILE` on the
# # process and leave the keys below commented out.
# # master_key_b64  = "REPLACE_ME_WITH_BASE64_32_BYTES"
# # master_key_file = "/etc/relayterm/recording-master-key"
#
# [terminal_recording.compression]
# # Only `none` ships in v1. The schema reserves `zstd` for a later
# # slice; configuring an unknown value is a hard boot failure.
# mode = "none"
#
# Retention cleanup. Stage A startup sweep AND Stage B periodic
# managed worker are both wired.
#
# Cleanup is INDEPENDENT of `terminal_recording.enabled`: turning
# recording off later MUST NOT make an existing recording corpus
# immortal. The validator checks this section regardless of the
# parent `enabled` flag, and both stages run as long as
# `cleanup.enabled = true` even when `terminal_recording.enabled =
# false`.
#
# Stage A — one bounded sweep at boot, AFTER terminal-session
# reconciliation and BEFORE the listener binds. Gated by
# `cleanup.enabled` AND `cleanup.startup_sweep_enabled`. Fail-soft:
# a repository error logs a static category tag and the boot
# continues.
#
# Stage B — managed periodic task, spawned after `AppState`
# construction and BEFORE the listener accepts connections. Gated
# by `cleanup.enabled` AND `cleanup.periodic_sweep_enabled` AND a
# non-zero `cleanup.sweep_interval_seconds`. The first periodic
# tick fires AFTER `sweep_interval_seconds` has elapsed (the
# startup sweep already drained the eligibility set on boot). Each
# tick acquires `pg_try_advisory_lock(<retention key>)` so a
# multi-instance deployment never double-sweeps — lock contention
# is a silent skip, not an error. Shutdown rides the same graceful-
# shutdown signal `axum::serve` uses; the worker's join is awaited
# AFTER the listener returns.
#
# Env name pattern: `RELAYTERM_TERMINAL_RECORDING__CLEANUP__<FIELD>`
# (all-caps, double-underscore as the section separator). Examples:
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__ENABLED=true
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__PERIODIC_SWEEP_ENABLED=true
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__SWEEP_INTERVAL_SECONDS=3600
#   RELAYTERM_TERMINAL_RECORDING__CLEANUP__BATCH_SIZE=250
#
# [terminal_recording.cleanup]
# enabled                 = true     # default true; master switch
# startup_sweep_enabled   = true     # default true; Stage A
# periodic_sweep_enabled  = false    # default false; Stage B
# sweep_interval_seconds  = 0        # 0 = no periodic schedule;
#                                    # otherwise 60..=604800
# batch_size              = 100      # 1..=10000; sessions per tick

# Live-terminal-session orchestration.
#
# Currently exposes one operator knob: how long a still-live SSH PTY
# lingers after the last client detaches before the orchestrator reaps
# it. Reattach within this window resumes the same shell (sequence-
# number replay); outside it the PTY closes and the session id
# surfaces a 409 from the WebSocket upgrade gate.
#
# SCOPE — read this before bumping the value. This is a SHORT-TERM
# RECONNECT GRACE WINDOW on a still-live PTY held by the running
# backend. It is NOT:
#   * durable session resume across backend restart (a restart drops
#     every live PTY regardless of this value);
#   * tmux/screen-style persistent shells (a separate, future
#     architecture);
#   * terminal-recording replay (covered by the
#     `[terminal_recording]` section above and `docs/spec/recording.md`).
#
# Operational impact of higher values: the backend holds the russh
# Channel, the broadcast/replay buffer, and any associated file
# descriptors for the full TTL after the last client disconnects. The
# upstream SSH server also sees the connection as live for the same
# window. Tune to your deployment's reconnect expectations and PTY
# budget — a low-traffic single-tenant slot can afford 600–1800s; a
# busy multi-tenant slot likely should not.
#
# Default: 30s (matches the historical hard-coded value). Bounded
# 5..=86400 (5s..24h). 0 and out-of-range values are a hard boot
# failure.
#
# Env: RELAYTERM_TERMINAL_SESSIONS__DETACHED_LIVE_PTY_TTL_SECONDS
#
# [terminal_sessions]
# detached_live_pty_ttl_seconds = 30

# Per-user ceiling on concurrent live PTY runtimes (Phase 1B.1 quota —
# see `docs/session-quotas.md`). Counted against the in-memory
# orchestrator registry; both `active` and `detached` sessions count
# equally. A `POST /api/v1/terminal-sessions` that would exceed this
# ceiling is refused with `429 too_many_sessions`. The refusal writes
# no DB row and no audit event — quota refusals are operational, not
# security-relevant (mirrors the login-throttler posture). The
# `current_count` / `cap` values stay server-side (operator `warn!`
# only); the wire body is the static `too many terminal sessions`
# string.
#
# Operational impact: each live PTY consumes one russh channel, one
# target-host PTY (with the upstream sshd's `MaxSessions` budget),
# one in-memory replay buffer, and one or more tasks. The quota is
# per-instance — a deployment running N instances behind a load
# balancer has an effective per-user ceiling of `N × this value`.
# Single-instance deployments are exact (the v1 default).
#
# Default: 8. Bounded 1..=256. 0 and out-of-range values are a hard
# boot failure. The default is conservative for solo homelab and
# defensible for a small multi-user deployment; reconsider after
# observing real usage. Phase 1B.2 will add the deployment-wide
# ceiling; the per-user starting-burst ceiling has landed below
# (Phase 1B.2a).
#
# Env: RELAYTERM_TERMINAL_SESSIONS__MAX_LIVE_PTY_SESSIONS_PER_USER
#
# [terminal_sessions]
# max_live_pty_sessions_per_user = 8

# Per-user ceiling on concurrent in-flight starting sessions (Phase
# 1B.2a quota — see `docs/session-quotas.md` § 4.3). Counts the
# disjoint set of `Starting` placeholders that have NOT yet bound a
# live PTY, so it never double-counts the live cap above. Defends
# against a runaway client that POSTs many sessions in flight without
# waiting for the PTY-start round-trip to complete. A `POST
# /api/v1/terminal-sessions` that would exceed this ceiling is
# refused with `429 too_many_starting_sessions`. The refusal writes
# no DB row and no audit event — same operational, not security-
# relevant posture as the live quota above.
#
# Operational impact: the starting count is typically zero in steady
# state because each successful create promotes its placeholder to
# Live within the same handler call. The cap is defensive against
# tight POST loops that race PTY-start round-trips.
#
# Default: 4. Bounded 1..=32. 0 and out-of-range values are a hard
# boot failure. The default is enough for honest SPA burst behaviour
# (a navigation that opens a few sessions in parallel) but rejects a
# tight POST loop. The live cap is the load-bearing ceiling for
# resource consumption; this knob is defence-in-depth.
#
# Env: RELAYTERM_TERMINAL_SESSIONS__MAX_STARTING_SESSIONS_PER_USER
#
# [terminal_sessions]
# max_starting_sessions_per_user = 4

# Deployment-wide ceiling on concurrent live PTY runtimes across ALL
# owners (Phase 1B.2b quota — `docs/session-quotas.md` § 4.2).
#
# Counted against THIS backend instance's in-memory registry. This
# value is exact for single-instance deployments (the v1 default);
# multi-instance topologies enforce per-instance best-effort — the
# effective deployment-wide ceiling is `N × per-instance` (§ 9 of
# `docs/session-quotas.md`). A `POST /api/v1/terminal-sessions` that
# would exceed this ceiling is refused with `429
# too_many_sessions_deployment`; the refusal writes no DB row and
# no audit event.
#
# Deliberately NOT exposed via `GET /api/v1/config/session-policy`
# (§ 5.4 — operator-only, fingerprinting risk). The SPA renders a
# STATIC refusal copy ("This RelayTerm deployment is at its live
# terminal session limit. Close an existing session or wait for a
# detached session to expire before starting another.") rather than
# parameterising on the cap.
#
# Default: 64 (conservative for single-tenant self-hosted; raise for
# multi-user homelab). Bounded 1..=4096. 0 and out-of-range values are
# a hard boot failure. The validator additionally rejects values below
# `max_live_pty_sessions_per_user` or `max_starting_sessions_per_user`
# — a per-user ceiling above the deployment ceiling is a contradiction.
#
# Env: RELAYTERM_TERMINAL_SESSIONS__MAX_LIVE_PTY_SESSIONS_PER_DEPLOYMENT
#
# [terminal_sessions]
# max_live_pty_sessions_per_deployment = 64
